<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="Monthly cost comparison: cloud API vs local 14B model">
  <defs>
    <linearGradient id="cloudBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b9a"/>
      <stop offset="1" stop-color="#b43969"/>
    </linearGradient>
    <linearGradient id="localBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="#0b0b14"/>
  <text x="40" y="48" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#f5f5ff">Illustrative monthly cost for 1M tokens/day of personal AI use</text>
  <text x="40" y="74" font-family="Inter, sans-serif" font-size="13" fill="#8a8ab0">Rough order-of-magnitude — pricing and power rates vary. Intent: show the shape, not the decimals.</text>

  <!-- Y axis -->
  <line x1="80" y1="110" x2="80" y2="400" stroke="#3a3a55" stroke-width="1"/>
  <line x1="80" y1="400" x2="860" y2="400" stroke="#3a3a55" stroke-width="1"/>

  <!-- Y ticks -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a90">
    <text x="72" y="404" text-anchor="end">$0</text>
    <text x="72" y="344" text-anchor="end">$100</text>
    <text x="72" y="284" text-anchor="end">$200</text>
    <text x="72" y="224" text-anchor="end">$300</text>
    <text x="72" y="164" text-anchor="end">$400</text>
    <text x="72" y="114" text-anchor="end">$500</text>
    <line x1="80" y1="340" x2="860" y2="340" stroke="#2a2a40" stroke-dasharray="3 4"/>
    <line x1="80" y1="280" x2="860" y2="280" stroke="#2a2a40" stroke-dasharray="3 4"/>
    <line x1="80" y1="220" x2="860" y2="220" stroke="#2a2a40" stroke-dasharray="3 4"/>
    <line x1="80" y1="160" x2="860" y2="160" stroke="#2a2a40" stroke-dasharray="3 4"/>
  </g>

  <!-- Bars -->
  <!-- Cloud ~ $450 -->
  <rect x="180" y="130" width="140" height="270" rx="6" fill="url(#cloudBar)"/>
  <text x="250" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#ffb1cb">≈ $450</text>
  <text x="250" y="424" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#d8d8ff">Frontier API</text>
  <text x="250" y="444" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#8a8ab0">metered · per token · per month</text>

  <!-- Subscription stack ~ $120 -->
  <rect x="400" y="328" width="140" height="72" rx="6" fill="#ffb347"/>
  <text x="470" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#ffd39a">≈ $120</text>
  <text x="470" y="424" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#d8d8ff">Stacked subscriptions</text>
  <text x="470" y="444" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#8a8ab0">Plus + Pro + Copilot + …</text>

  <!-- Local ~ $8 electricity -->
  <rect x="620" y="395" width="140" height="5" rx="2" fill="url(#localBar)"/>
  <text x="690" y="382" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#b1f0ff">≈ $8 electricity</text>
  <text x="690" y="424" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#d8d8ff">Local 14B (Q4)</text>
  <text x="690" y="444" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#8a8ab0">one-time GPU · runs on idle silicon</text>

  <!-- Caption -->
  <text x="80" y="468" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a90">// the cost gap is the whole point — local AI stops charging you per thought.</text>
</svg>
