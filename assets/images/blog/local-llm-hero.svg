<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Laptop running a local LLM with streaming tokens">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d1a"/>
      <stop offset="1" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#818cf8" stop-opacity="1"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="520" fill="url(#bg2)"/>
  <!-- Floating dots -->
  <g fill="#818cf8" opacity="0.25">
    <circle cx="120" cy="80" r="2.5"/>
    <circle cx="260" cy="420" r="3"/>
    <circle cx="980" cy="120" r="2"/>
    <circle cx="1100" cy="380" r="2.8"/>
    <circle cx="520" cy="60" r="2.3"/>
  </g>
  <!-- Laptop body -->
  <g transform="translate(240,60)">
    <path d="M0 360 L720 360 L760 390 L-40 390 Z" fill="#1a1a30" stroke="#3a3a55" stroke-width="1.5"/>
    <rect x="0" y="0" width="720" height="360" rx="14" fill="#0e0e1d" stroke="#3a3a55" stroke-width="1.5"/>
    <rect x="18" y="18" width="684" height="324" rx="6" fill="#07070f"/>
    <!-- macOS dots -->
    <circle cx="42" cy="40" r="6" fill="#ff5f57"/>
    <circle cx="64" cy="40" r="6" fill="#febc2e"/>
    <circle cx="86" cy="40" r="6" fill="#28c840"/>
    <text x="360" y="46" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#5a5a80">~/llm — qwen-7b-q4 — 80×24</text>

    <!-- Streaming tokens -->
    <g font-family="JetBrains Mono, monospace" font-size="16">
      <text x="40" y="90" fill="#818cf8">user@local</text><text x="160" y="90" fill="#5a5a80">:~$</text><text x="205" y="90" fill="#e5e5ff">ollama run qwen2:7b</text>
      <text x="40" y="128" fill="#22d3ee">loading</text><text x="115" y="128" fill="#a5a5c8">qwen2-7b-instruct-q4_k_m.gguf  (4.1 GiB)</text>
      <text x="40" y="156" fill="#a5ffb3">[████████████████████] 100%  · ready · 0ms network</text>
      <text x="40" y="200" fill="#818cf8">&gt;&gt;&gt;</text><text x="80" y="200" fill="#e5e5ff">Why does running you locally matter?</text>

      <text x="40" y="240" fill="#b8b8ff">Because your prompts are yours. They</text>
      <text x="40" y="262" fill="#b8b8ff">never leave this machine. There is no</text>
      <text x="40" y="284" fill="#b8b8ff">retention policy because there is no</text>
      <text x="40" y="306" fill="#b8b8ff">provider. And tomorrow — when the Wi-Fi</text>
      <text x="40" y="328" fill="#b8b8ff">dies, when the API raises its prices,</text>
    </g>
    <!-- Blinking cursor -->
    <rect x="40" y="336" width="10" height="2" fill="#818cf8"/>
  </g>
  <!-- Stream lines -->
  <g opacity="0.6">
    <rect x="40" y="220" width="200" height="2" fill="url(#stream)"/>
    <rect x="960" y="260" width="200" height="2" fill="url(#stream)"/>
    <rect x="60" y="300" width="140" height="2" fill="url(#stream)"/>
  </g>
</svg>
